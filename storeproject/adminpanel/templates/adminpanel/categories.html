{% extends 'adminpanel/base.html' %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/categories.css' %}">
{% endblock %}
{% block content %}

<h2>Categories</h2>

<a href="{% url 'add_category' %}">+ Add Category</a>

<table>
<tr>
<th>Name</th>
<th>Action</th>
</tr>

{% for c in categories %}
<tr>
<td data-label="Name">{{ c.name }}</td>
<td data-label="Action">
   <td>
    <a href="{% url 'edit_category' c.id %}" class="edit">Edit</a>
    <a href="{% url 'delete_category' c.id %}" class="delete">Delete</a>
</td>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
