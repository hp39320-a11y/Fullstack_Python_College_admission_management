{% extends 'adminpanel/base.html' %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/categories.css' %}">
{% endblock %}
{% block content %}

<h2>Subcategories</h2>

<a href="{% url 'add_subcategory' %}">+ Add Subcategory</a>

<table>
<tr>
<th>Name</th>
<th>Category</th>
<th>Action</th>
</tr>

{% for s in subs %}
<tr>
<td>{{ s.name }}</td>
<td>{{ s.category.name }}</td>
<td>
<a href="{% url 'edit_subcategory' s.id %}" class="edit">Edit</a>
<a href="{% url 'delete_subcategory' s.id %}" class="delete">Delete</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
